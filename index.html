<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Quiz</title>
</head>
<body>

<section class = "corpo">
    <header>
        <h1>Quiz</h1>
    </header>

    <!--Tela Inicial-->
    <section class="page" id="page-home">
        <h2 id="description-quiz">[Descrição do Quiz]</h2>
        <button id="button-init">Iniciar</button>
    </section>

    <!--Tela de Quiz-->
    <section class="hidden" id="page-quiz">
        <h2 id="question">[Pergunta]</h2>
        <div class="answer">[Respostas]</div>
    </section>

    <!--Tela de Resultado-->
    <section class="hidden" id="page-results">
        <img src="" alt="img-character">
        <h2 id="name-character">[Nome do Personagem]</h2>
        <p id="description-character">[Descrição do Personagem]</p>
    </section>

    <footer>
        ©grupo6
    </footer>
</section>

<script type="module" src="main.js"></script>
</body>
</html>
